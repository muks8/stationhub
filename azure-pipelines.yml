trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  acrName: mukacr
  imageName: reactapp
  tag: $(Build.BuildId)

stages:

# ─────────────────────────────────────────
# STAGE 1: BUILD
# ─────────────────────────────────────────
- stage: Build
  displayName: "Build Docker Image"
  jobs:
  - job: BuildJob
    steps:
    - checkout: self

    - script: |
        docker build -t $(acrName).azurecr.io/$(imageName):$(tag) .
      displayName: Build Docker Image

    - script: |
        docker save $(acrName).azurecr.io/$(imageName):$(tag) | gzip > image.tar.gz
      displayName: Save Image as Artifact

    - publish: image.tar.gz
      artifact: docker-image

# ─────────────────────────────────────────
# STAGE 2: TRIVY SCAN
# ─────────────────────────────────────────
- stage: Scan
  displayName: "Security Scan (Trivy)"
  dependsOn: Build
  jobs:
  - job: ScanJob
    steps:
    - download: current
      artifact: docker-image

    - script: |
        docker load < $(Pipeline.Workspace)/docker-image/image.tar.gz
      displayName: Load Image

    - script: |
        sudo apt-get install -y wget
        wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
        sudo sh install.sh -b /usr/local/bin
        trivy image \
          --severity CRITICAL \
          --exit-code 1 \
          --no-progress \
          $(acrName).azurecr.io/$(imageName):$(tag)
      displayName: Trivy Scan

# ─────────────────────────────────────────
# STAGE 3: PUSH TO ACR
# ─────────────────────────────────────────
- stage: Push
  displayName: "Push to ACR"
  dependsOn: Scan
  condition: succeeded()
  jobs:
  - job: PushJob
    steps:
    - download: current
      artifact: docker-image

    - script: |
        docker load < $(Pipeline.Workspace)/docker-image/image.tar.gz
      displayName: Load Image

    - task: AzureCLI@2
      displayName: Login and Push to ACR
      inputs:
        azureSubscription: myserviceprinciple
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(acrName)
          docker push $(acrName).azurecr.io/$(imageName):$(tag)

# ─────────────────────────────────────────
# STAGE 4: INFRA SETUP — NGINX + Cert Manager
# (Sirf ek baar hoga — idempotent hai)
# ─────────────────────────────────────────
- stage: InfraSetup
  displayName: "Install NGINX Ingress + Cert Manager"
  dependsOn: Push
  condition: succeeded()
  jobs:
  - job: InfraSetupJob
    steps:
    - task: AzureCLI@2
      displayName: Install NGINX and Cert Manager
      inputs:
        azureSubscription: myserviceprinciple
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az aks get-credentials \
            --resource-group mukeRG \
            --name MYAKS \
            --overwrite-existing

          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

          # NGINX Ingress Controller install karo
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.8.2/deploy/static/provider/cloud/deploy.yaml

          # Wait karo NGINX ready hone tak
          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=120s

          # Cert Manager install karo
          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.0/cert-manager.yaml

          # Wait karo Cert Manager ready hone tak
          kubectl wait --namespace cert-manager \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/instance=cert-manager \
            --timeout=120s

          echo "✅ NGINX Ingress + Cert Manager ready!"

          # IP dekho — GoDaddy mein yahi lagani hai
          kubectl get svc -n ingress-nginx

# ─────────────────────────────────────────
# STAGE 5: DEPLOY DEV — Blue-Green + HPA (Auto)
# ─────────────────────────────────────────
- stage: DeployDev
  displayName: "Deploy DEV (Blue-Green + HPA)"
  dependsOn: InfraSetup
  condition: succeeded()
  jobs:
  - deployment: DeployDevJob
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Blue-Green Deploy to DEV
            inputs:
              azureSubscription: myserviceprinciple
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials \
                  --resource-group mukeRG \
                  --name MYAKS \
                  --overwrite-existing

                curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

                # Namespace banao agar nahi hai
                kubectl create namespace dev --dry-run=client -o yaml | kubectl apply -f -

                # Pata karo abhi konsa color live hai
                CURRENT=$(helm get values reactapp-dev -n dev --output json 2>/dev/null | \
                          python3 -c "import sys,json; print(json.load(sys.stdin).get('activeColor','blue'))" \
                          2>/dev/null || echo "blue")
                echo "Current active color: $CURRENT"

                # Opposite color decide karo
                if [ "$CURRENT" = "blue" ]; then
                  NEW_COLOR="green"
                else
                  NEW_COLOR="blue"
                fi
                echo "Deploying new code to: $NEW_COLOR"

                # Step 1 — Naye color pe deploy karo (traffic nahi jaayega abhi)
                helm upgrade --install reactapp-dev ./helm-chart \
                  -f ./helm-chart/values-dev.yaml \
                  --set image.repository=$(acrName).azurecr.io/$(imageName) \
                  --set activeColor=$CURRENT \
                  --set ${NEW_COLOR}Tag=$(tag) \
                  --namespace dev \
                  --wait

                # Step 2 — Traffic switch karo naye color pe
                helm upgrade reactapp-dev ./helm-chart \
                  -f ./helm-chart/values-dev.yaml \
                  --set image.repository=$(acrName).azurecr.io/$(imageName) \
                  --set activeColor=$NEW_COLOR \
                  --set ${NEW_COLOR}Tag=$(tag) \
                  --namespace dev \
                  --wait

                echo "✅ DEV: Traffic switched to $NEW_COLOR (tag: $(tag))"

                # Verify karo
                kubectl get pods -n dev
                kubectl get hpa -n dev
                kubectl get ingress -n dev

# ─────────────────────────────────────────
# STAGE 6: DEPLOY STAGING — Blue-Green + HPA (Approval)
# ─────────────────────────────────────────
- stage: DeployStaging
  displayName: "Deploy STAGING (Blue-Green + HPA)"
  dependsOn: DeployDev
  condition: succeeded()
  jobs:
  - deployment: DeployStagingJob
    environment: staging          # ← yahan approval rukegi pipeline
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Blue-Green Deploy to STAGING
            inputs:
              azureSubscription: myserviceprinciple
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials \
                  --resource-group mukeRG \
                  --name MYAKS \
                  --overwrite-existing

                curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

                # Namespace banao agar nahi hai
                kubectl create namespace staging --dry-run=client -o yaml | kubectl apply -f -

                # Pata karo abhi konsa color live hai
                CURRENT=$(helm get values reactapp-staging -n staging --output json 2>/dev/null | \
                          python3 -c "import sys,json; print(json.load(sys.stdin).get('activeColor','blue'))" \
                          2>/dev/null || echo "blue")
                echo "Current active color: $CURRENT"

                # Opposite color decide karo
                if [ "$CURRENT" = "blue" ]; then
                  NEW_COLOR="green"
                else
                  NEW_COLOR="blue"
                fi
                echo "Deploying new code to: $NEW_COLOR"

                # Step 1 — Naye color pe deploy karo
                helm upgrade --install reactapp-staging ./helm-chart \
                  -f ./helm-chart/values-staging.yaml \
                  --set image.repository=$(acrName).azurecr.io/$(imageName) \
                  --set activeColor=$CURRENT \
                  --set ${NEW_COLOR}Tag=$(tag) \
                  --namespace staging \
                  --wait

                # Step 2 — Traffic switch karo
                helm upgrade reactapp-staging ./helm-chart \
                  -f ./helm-chart/values-staging.yaml \
                  --set image.repository=$(acrName).azurecr.io/$(imageName) \
                  --set activeColor=$NEW_COLOR \
                  --set ${NEW_COLOR}Tag=$(tag) \
                  --namespace staging \
                  --wait

                echo "✅ STAGING: Traffic switched to $NEW_COLOR (tag: $(tag))"

                # Verify karo
                kubectl get pods -n staging
                kubectl get hpa -n staging
                kubectl get ingress -n staging

# ─────────────────────────────────────────
# STAGE 7: DEPLOY PROD — Blue-Green + HPA (Manager Approval)
# ─────────────────────────────────────────
- stage: DeployProd
  displayName: "Deploy PROD (Blue-Green + HPA)"
  dependsOn: DeployStaging
  condition: succeeded()
  jobs:
  - deployment: DeployProdJob
    environment: prod             # ← yahan manager approval rukegi
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: Blue-Green Deploy to PROD
            inputs:
              azureSubscription: myserviceprinciple
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials \
                  --resource-group mukeRG \
                  --name MYAKS \
                  --overwrite-existing

                curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

                # Namespace banao agar nahi hai
                kubectl create namespace prod --dry-run=client -o yaml | kubectl apply -f -

                # Pata karo abhi konsa color live hai
                CURRENT=$(helm get values reactapp-prod -n prod --output json 2>/dev/null | \
                          python3 -c "import sys,json; print(json.load(sys.stdin).get('activeColor','blue'))" \
                          2>/dev/null || echo "blue")
                echo "Current active color: $CURRENT"

                # Opposite color decide karo
                if [ "$CURRENT" = "blue" ]; then
                  NEW_COLOR="green"
                else
                  NEW_COLOR="blue"
                fi
                echo "Deploying new code to: $NEW_COLOR"

                # Step 1 — Naye color pe deploy karo
                helm upgrade --install reactapp-prod ./helm-chart \
                  -f ./helm-chart/values-prod.yaml \
                  --set image.repository=$(acrName).azurecr.io/$(imageName) \
                  --set activeColor=$CURRENT \
                  --set ${NEW_COLOR}Tag=$(tag) \
                  --namespace prod \
                  --wait

                # Step 2 — Traffic switch karo
                helm upgrade reactapp-prod ./helm-chart \
                  -f ./helm-chart/values-prod.yaml \
                  --set image.repository=$(acrName).azurecr.io/$(imageName) \
                  --set activeColor=$NEW_COLOR \
                  --set ${NEW_COLOR}Tag=$(tag) \
                  --namespace prod \
                  --wait

                echo "✅ PROD: Traffic switched to $NEW_COLOR (tag: $(tag))"