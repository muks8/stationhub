trigger: none

pool:
  vmImage: ubuntu-latest

variables:
  acrName: mukacr
  imageName: stationhub-backend
  tag: $(Build.BuildId)
  devServiceConnection: myserviceprinciple
  prodServiceConnection: myserviceprinciple

stages:

- stage: Build
  displayName: "Build Backend Image"
  jobs:
  - job: BuildJob
    steps:
    - checkout: self
    - script: |
        docker build -t $(acrName).azurecr.io/$(imageName):$(tag) ./backend
      displayName: Build Docker Image
    - script: |
        docker save $(acrName).azurecr.io/$(imageName):$(tag) | gzip > image.tar.gz
      displayName: Save Image as Artifact
    - publish: image.tar.gz
      artifact: docker-image

- stage: Scan
  displayName: "Security Scan (Trivy)"
  dependsOn: Build
  jobs:
  - job: ScanJob
    steps:
    - download: current
      artifact: docker-image
    - script: |
        docker load < $(Pipeline.Workspace)/docker-image/image.tar.gz
      displayName: Load Image
    - script: |
        sudo apt-get install -y wget
        wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
        sudo sh install.sh -b /usr/local/bin
        trivy image \
          --severity CRITICAL \
          --exit-code 1 \
          --no-progress \
          $(acrName).azurecr.io/$(imageName):$(tag)
      displayName: Trivy Scan

- stage: Push
  displayName: "Push to ACR"
  dependsOn: Scan
  condition: succeeded()
  jobs:
  - job: PushJob
    steps:
    - download: current
      artifact: docker-image
    - script: |
        docker load < $(Pipeline.Workspace)/docker-image/image.tar.gz
      displayName: Load Image
    - task: AzureCLI@2
      displayName: Login and Push to ACR
      inputs:
        azureSubscription: $(devServiceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(acrName)
          docker push $(acrName).azurecr.io/$(imageName):$(tag)

- stage: InfraSetup
  displayName: "Setup AGIC + Cert Manager"
  dependsOn: Push
  condition: succeeded()
  jobs:
  - job: InfraSetupJob
    steps:
    - task: AzureCLI@2
      displayName: Verify AGIC and Install Cert Manager
      inputs:
        azureSubscription: $(devServiceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az aks get-credentials \
            --resource-group mukeRG \
            --name MYAKS \
            --overwrite-existing

          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          kubectl get pods -n kube-system | grep ingress-appgw
          echo "✅ AGIC is running!"

          kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.13.0/cert-manager.yaml
          kubectl wait --namespace cert-manager \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/instance=cert-manager \
            --timeout=120s
          echo "✅ Cert Manager ready!"

- stage: DeployDev
  displayName: "Deploy DEV Backend (Blue-Green)"
  dependsOn: InfraSetup
  condition: succeeded()
  jobs:
  - deployment: DeployDevJob
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: Blue-Green Deploy Backend to DEV
            inputs:
              azureSubscription: $(devServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials \
                  --resource-group mukeRG \
                  --name MYAKS \
                  --overwrite-existing

                curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

                kubectl create namespace dev-backend \
                  --dry-run=client -o yaml | kubectl apply -f -

                CURRENT=$(helm get values stationhub-backend-dev \
                  -n dev-backend --output json 2>/dev/null | \
                  python3 -c "import sys,json; \
                  print(json.load(sys.stdin).get('activeColor','blue'))" \
                  2>/dev/null || echo "blue")
                echo "Current: $CURRENT"

                if [ "$CURRENT" = "blue" ]; then
                  NEW_COLOR="green"
                else
                  NEW_COLOR="blue"
                fi
                echo "Deploying to: $NEW_COLOR"

                helm upgrade --install stationhub-backend-dev \
                  ./helm-chart/backend \
                  -f ./helm-chart/backend/values-dev.yaml \
                  --set image.repository=$(acrName).azurecr.io/$(imageName) \
                  --set activeColor=$CURRENT \
                  --set ${NEW_COLOR}Tag=$(tag) \
                  --set "env.DB_SERVER=$(DB_SERVER)" \
                  --set "env.DB_USER=$(DB_USER)" \
                  --set "env.DB_PASSWORD=$(DB_PASSWORD)" \
                  --set "env.JWT_SECRET=$(JWT_SECRET)" \
                  --namespace dev-backend \
                  --wait

                helm upgrade stationhub-backend-dev \
                  ./helm-chart/backend \
                  -f ./helm-chart/backend/values-dev.yaml \
                  --set image.repository=$(acrName).azurecr.io/$(imageName) \
                  --set activeColor=$NEW_COLOR \
                  --set ${NEW_COLOR}Tag=$(tag) \
                  --set "env.DB_SERVER=$(DB_SERVER)" \
                  --set "env.DB_USER=$(DB_USER)" \
                  --set "env.DB_PASSWORD=$(DB_PASSWORD)" \
                  --set "env.JWT_SECRET=$(JWT_SECRET)" \
                  --namespace dev-backend \
                  --wait

                echo "✅ DEV Backend: $NEW_COLOR (tag: $(tag))"
                kubectl get pods -n dev-backend
                kubectl get ingress -n dev-backend

