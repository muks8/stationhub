- stage: DeployProd
  displayName: "Deploy PROD Backend (Blue-Green)"
  dependsOn: DeployStaging
  condition: succeeded()
  jobs:
  - deployment: DeployProdJob
    environment: prod
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: Blue-Green Deploy Backend to PROD
            inputs:
              azureSubscription: $(prodServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
