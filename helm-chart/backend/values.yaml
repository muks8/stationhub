image:
  repository: mukacr.azurecr.io/stationhub-backend
  tag: latest
  pullPolicy: Always

# Blue-Green config
activeColor: blue
blueTag: latest
greenTag: latest

replicaCount: 1
namespace: dev

service:
  port: 8000
  type: ClusterIP

ingress:
  enabled: false
  host: ""

# HPA config
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  cpuThreshold: 70
  memoryThreshold: 80

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Probes
probes:
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3
    timeoutSeconds: 5
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
    successThreshold: 1
    timeoutSeconds: 5

# DB config — pipeline inject karega
env:
  DB_SERVER: ""
  DB_NAME: ""
  DB_USER: ""
  FRONTEND_URL: ""