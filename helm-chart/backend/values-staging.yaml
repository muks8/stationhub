namespace: staging-backend
replicaCount: 2
activeColor: blue

service:
  port: 8000
  type: ClusterIP

ingress:
  enabled: true
  host: api-staging.stationhub.in

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  cpuThreshold: 70
  memoryThreshold: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

probes:
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
    failureThreshold: 3
    timeoutSeconds: 5
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
    successThreshold: 1
    timeoutSeconds: 5

env:
  FRONTEND_URL: "https://staging.stationhub.in"
  DB_NAME: "stationhub"
  DB_SERVER: ""
  DB_USER: ""
  DB_PASSWORD: ""
  JWT_SECRET: ""