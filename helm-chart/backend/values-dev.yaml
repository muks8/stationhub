namespace: dev
replicaCount: 1
activeColor: blue

service:
  port: 8000
  type: ClusterIP

ingress:
  enabled: true
  host: api-dev.stationhub.in

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuThreshold: 70
  memoryThreshold: 80

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  FRONTEND_URL: "https://dev.stationhub.in"
  DB_NAME: "stationhub"