image:
  repository: mukacr.azurecr.io/reactapp
  tag: latest
  pullPolicy: Always

# Blue-Green config
activeColor: blue
blueTag: latest
greenTag: latest

replicaCount: 1
namespace: dev

service:
  port: 80
  type: ClusterIP          # LoadBalancer se ClusterIP kiya — Ingress handle karega

ingress:
  enabled: false           # default false — values-dev/staging/prod mein true hoga
  host: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

# HPA config
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  cpuThreshold: 70
  memoryThreshold: 80