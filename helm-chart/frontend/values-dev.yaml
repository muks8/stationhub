namespace: dev
replicaCount: 1
activeColor: blue

service:
  type: ClusterIP          # LoadBalancer se ClusterIP kiya

ingress:
  enabled: true
  host: dev.stationhub.in  # DEV subdomain

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  cpuThreshold: 70
  memoryThreshold: 80

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi